name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest

    # Build/typecheck için gereken sahte değerler. Gerçek bir DB'ye bağlanılmaz:
    # prisma generate ağ istemez ve auth() kullanan sayfalar dinamik olduğu için
    # build sırasında DB sorgulanmaz.
    env:
      DATABASE_URL: "postgresql://user:pass@localhost:5432/fonly"
      AUTH_SECRET: "ci-dummy-secret-not-used-for-anything-real"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
